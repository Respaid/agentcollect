<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentCollect — This Is What AI Sounds Like</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23433196'/%3E%3Ctext x='28' y='48' text-anchor='middle' fill='white' font-family='system-ui' font-weight='900' font-size='46' letter-spacing='-3'%3EA%3C/text%3E%3Ccircle cx='52' cy='16' r='6' fill='white' opacity='0.85'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#050505;
            --human:rgba(255,255,255,.12);--human-hot:#fff;
            --ai:#818cf8;--ai-dim:rgba(129,140,248,.15);
            --green:#34d399;--red:#ff4444;
            --display:'Plus Jakarta Sans',system-ui,sans-serif;
            --sans:'Inter',system-ui,sans-serif;
        }
        html,body{height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:var(--sans);-webkit-font-smoothing:antialiased}
        ::selection{background:rgba(129,140,248,.2)}

        /* STAGE */
        .stage{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}

        /* LOGO */
        .logo{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:100;font-family:var(--display);font-size:13px;font-weight:800;
            letter-spacing:-.02em;color:rgba(255,255,255,.15);text-decoration:none}
        .logo .d{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--ai);margin-left:1px;vertical-align:super}

        /* AUDIO TOGGLE */
        .audio-toggle{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:100;
            padding:8px 20px;border-radius:100px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);
            backdrop-filter:blur(20px);color:rgba(255,255,255,.35);font-size:11px;font-weight:600;cursor:pointer;
            font-family:var(--sans);letter-spacing:.03em;transition:all .3s;display:flex;align-items:center;gap:6px}
        .audio-toggle:hover{border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.5)}
        .audio-toggle.on{border-color:rgba(129,140,248,.3);color:var(--ai);background:rgba(129,140,248,.05)}
        .audio-toggle svg{width:14px;height:14px;fill:currentColor}

        /* CTA */
        .cta-float{position:fixed;bottom:28px;right:28px;z-index:100;padding:10px 22px;background:#4f46e5;color:#fff;border:none;
            border-radius:10px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;
            transition:all .2s;opacity:0;animation:cta-in 1s 2s forwards}
        .cta-float:hover{background:#4338ca;transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,70,229,.3)}
        @keyframes cta-in{to{opacity:1}}

        /* SCENE CONTAINER */
        .scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 40px;
            opacity:0;transition:opacity .6s cubic-bezier(.16,1,.3,1)}
        .scene.active{opacity:1}

        /* TEXT LINES */
        .line{text-align:center;max-width:1100px;width:100%;opacity:0;transform:translateY(30px) scale(.97);
            transition:all .7s cubic-bezier(.16,1,.3,1);margin:8px 0}
        .line.show{opacity:1;transform:translateY(0) scale(1)}

        /* SPEAKER LABEL */
        .speaker{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
        .speaker.human{color:rgba(255,255,255,.2)}
        .speaker.ai{color:rgba(129,140,248,.4)}

        /* THE TEXT — this is the star */
        .words{font-family:var(--display);font-weight:900;letter-spacing:-.05em;line-height:.95}

        /* Sizes */
        .words.xl{font-size:clamp(48px,8vw,120px)}
        .words.lg{font-size:clamp(36px,6vw,88px)}
        .words.md{font-size:clamp(28px,4.5vw,64px)}
        .words.sm{font-size:clamp(20px,3vw,42px)}

        /* Colors / Moods */
        .words.angry{color:#fff;text-shadow:0 0 80px rgba(255,68,68,.15)}
        .words.frustrated{color:rgba(255,255,255,.85)}
        .words.calm{color:var(--ai)}
        .words.soft{color:rgba(129,140,248,.7)}
        .words.win{color:var(--green)}
        .words.dim{color:rgba(255,255,255,.25)}
        .words.surprise{color:rgba(255,255,255,.9)}

        /* OUTCOME BADGE */
        .badge{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:100px;
            font-family:var(--sans);font-size:14px;font-weight:600;opacity:0;transform:scale(.9);
            transition:all .5s cubic-bezier(.16,1,.3,1)}
        .badge.show{opacity:1;transform:scale(1)}
        .badge.green{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.15);color:var(--green)}
        .badge.indigo{background:rgba(129,140,248,.06);border:1px solid rgba(129,140,248,.12);color:var(--ai)}

        /* PROGRESS DOTS */
        .dots{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:6px;
            opacity:0;animation:cta-in .5s 1.5s forwards}
        .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .3s}
        .dot.active{background:var(--ai);width:20px;border-radius:3px}

        /* RESPONSIVE */
        @media(max-width:640px){
            .scene{padding:0 20px}
            .cta-float{bottom:auto;top:24px;right:16px;padding:8px 16px;font-size:12px}
            .audio-toggle{bottom:16px;padding:6px 16px;font-size:10px}
            .dots{bottom:52px}
            .logo{top:26px;left:16px;transform:none}
        }
    </style>
</head>
<body>

<a href="/" class="logo">AgentCollect<span class="d"></span></a>

<!-- Audio toggle -->
<button class="audio-toggle" id="audioBtn">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.49 4.49 0 0 0 2.5-3.5zM14 3.23v2.06a6.51 6.51 0 0 1 0 13.42v2.06A8.51 8.51 0 0 0 14 3.23z"/></svg>
    Enable audio
</button>

<!-- CTA -->
<a href="https://cal.com/johnb/30" class="cta-float" target="_blank">Book a demo</a>

<!-- Progress dots -->
<div class="dots" id="dots"></div>

<!-- STAGE -->
<div class="stage" id="stage"></div>

<script>
(function(){
    // ═══════════════════════════════════════
    // SCENES — pure cinema
    // ═══════════════════════════════════════
    const scenes = [
        // Scene 1: The angry debtor → AI stays cool → pays
        {
            audio: 'https://dxc03zgurdly9.cloudfront.net/075961824e83d68a634b91afb75f59fba97b1b2951c58dc43ec9a5e3bc58b806/recording.wav',
            audioStart: 8,
            beats: [
                { delay: 0, speaker: 'human', text: '"What are we getting', size: 'lg', mood: 'frustrated' },
                { delay: 600, speaker: null, text: 'charged for exactly?"', size: 'xl', mood: 'angry' },
                { delay: 2500, clear: true },
                { delay: 3000, speaker: 'ai', text: '$29.99.', size: 'xl', mood: 'calm' },
                { delay: 3600, speaker: null, text: 'Background check from Checkr.', size: 'md', mood: 'soft' },
                { delay: 5500, clear: true },
                { delay: 6000, speaker: 'human', text: '"Can I pay from', size: 'md', mood: 'frustrated' },
                { delay: 6400, speaker: null, text: 'the website?"', size: 'lg', mood: 'surprise' },
                { delay: 8000, clear: true },
                { delay: 8500, speaker: 'ai', text: 'Use the portal link', size: 'lg', mood: 'calm' },
                { delay: 9000, speaker: null, text: 'in the email.', size: 'md', mood: 'soft' },
                { delay: 10800, clear: true },
                { delay: 11200, speaker: 'human', text: '"Got it.', size: 'lg', mood: 'surprise' },
                { delay: 11800, speaker: null, text: 'Bye bye."', size: 'xl', mood: 'dim' },
                { delay: 13500, clear: true },
                { delay: 14000, badge: true, text: 'Objection handled. Directed to portal.', cls: 'indigo' },
            ]
        },
        // Scene 2: Gatekeeper → AI gets the contact
        {
            audio: 'https://dxc03zgurdly9.cloudfront.net/00d79b2208aee99e88fb7a0033974bba3140f3b905b388429b22133e4694c670/recording.wav',
            audioStart: 56,
            beats: [
                { delay: 0, speaker: 'human', text: '"I don\'t deal', size: 'lg', mood: 'frustrated' },
                { delay: 500, speaker: null, text: 'with that."', size: 'xl', mood: 'angry' },
                { delay: 2500, clear: true },
                { delay: 3000, speaker: 'ai', text: 'Could you give me', size: 'md', mood: 'calm' },
                { delay: 3400, speaker: null, text: 'the AP contact?', size: 'lg', mood: 'calm' },
                { delay: 5200, clear: true },
                { delay: 5600, speaker: 'human', text: '"One sec...', size: 'md', mood: 'dim' },
                { delay: 6800, speaker: null, text: '916-845-8340."', size: 'xl', mood: 'surprise' },
                { delay: 9000, clear: true },
                { delay: 9400, speaker: 'ai', text: 'And their email?', size: 'lg', mood: 'calm' },
                { delay: 11000, clear: true },
                { delay: 11400, speaker: 'human', text: '"ap-invoices', size: 'lg', mood: 'surprise' },
                { delay: 11900, speaker: null, text: '@caloes.ca.gov"', size: 'md', mood: 'dim' },
                { delay: 14000, clear: true },
                { delay: 14500, badge: true, text: 'New AP contact collected.', cls: 'indigo' },
            ]
        },
        // Scene 3: Pays on the spot — the closer
        {
            audio: 'https://dxc03zgurdly9.cloudfront.net/10b4ec959b4a004a6bf47dcfa2da0a213c7ce231590e295d9c60faffde486685/recording.wav',
            audioStart: 35,
            beats: [
                { delay: 0, speaker: 'human', text: '"I\'m paying it', size: 'lg', mood: 'surprise' },
                { delay: 500, speaker: null, text: 'right now!"', size: 'xl', mood: 'angry' },
                { delay: 2800, clear: true },
                { delay: 3200, speaker: 'human', text: '"It slipped through', size: 'md', mood: 'frustrated' },
                { delay: 3600, speaker: null, text: 'the cracks."', size: 'lg', mood: 'dim' },
                { delay: 5500, clear: true },
                { delay: 6000, speaker: 'ai', text: 'No worries.', size: 'xl', mood: 'calm' },
                { delay: 6800, speaker: null, text: 'I\'ll stay on the line.', size: 'md', mood: 'soft' },
                { delay: 9000, clear: true },
                { delay: 9800, speaker: 'human', text: '"Payment', size: 'lg', mood: 'surprise' },
                { delay: 10200, speaker: null, text: 'sent."', size: 'xl', mood: 'win' },
                { delay: 12500, clear: true },
                { delay: 13000, badge: true, text: 'Paid during the call. $0 manual work.', cls: 'green' },
            ]
        }
    ];

    // ═══════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════
    let currentScene = 0;
    let timers = [];
    let audioEl = null;
    let audioEnabled = false;
    const stage = document.getElementById('stage');
    const dotsEl = document.getElementById('dots');
    const audioBtn = document.getElementById('audioBtn');

    // Build dots
    scenes.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === 0 ? ' active' : '');
        d.addEventListener('click', () => playScene(i));
        dotsEl.appendChild(d);
    });

    // ═══════════════════════════════════════
    // AUDIO TOGGLE
    // ═══════════════════════════════════════
    audioBtn.addEventListener('click', () => {
        audioEnabled = !audioEnabled;
        audioBtn.classList.toggle('on', audioEnabled);
        audioBtn.innerHTML = audioEnabled
            ? '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.49 4.49 0 0 0 2.5-3.5zM14 3.23v2.06a6.51 6.51 0 0 1 0 13.42v2.06A8.51 8.51 0 0 0 14 3.23z"/></svg> Audio on'
            : '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 8.5v7a4.49 4.49 0 0 0 2.5-3.5zM14 3.23v2.06a6.51 6.51 0 0 1 0 13.42v2.06A8.51 8.51 0 0 0 14 3.23z"/></svg> Enable audio';
        if (audioEnabled && !audioEl) {
            // Restart current scene with audio
            playScene(currentScene);
        }
        if (!audioEnabled && audioEl) {
            audioEl.pause();
            audioEl = null;
        }
    });

    // ═══════════════════════════════════════
    // PLAY SCENE
    // ═══════════════════════════════════════
    function playScene(idx) {
        // Clear previous
        timers.forEach(t => clearTimeout(t));
        timers = [];
        if (audioEl) { audioEl.pause(); audioEl = null; }

        currentScene = idx;
        const scene = scenes[idx];

        // Update dots
        dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));

        // Clear stage
        stage.innerHTML = '';
        const container = document.createElement('div');
        container.className = 'scene active';
        stage.appendChild(container);

        // Audio
        if (audioEnabled) {
            audioEl = new Audio(scene.audio);
            audioEl.currentTime = scene.audioStart;
            audioEl.play().catch(() => {});
        }

        // Schedule beats
        let lastBeatEnd = 0;
        scene.beats.forEach(beat => {
            const t = setTimeout(() => {
                if (beat.clear) {
                    // Fade out all lines
                    container.querySelectorAll('.line').forEach(l => {
                        l.style.opacity = '0';
                        l.style.transform = 'translateY(-20px) scale(.98)';
                    });
                    setTimeout(() => {
                        container.querySelectorAll('.line').forEach(l => l.remove());
                    }, 400);
                    return;
                }

                if (beat.badge) {
                    const b = document.createElement('div');
                    b.className = 'line';
                    b.innerHTML = '<div class="badge ' + beat.cls + '">' + beat.text + '</div>';
                    container.appendChild(b);
                    requestAnimationFrame(() => {
                        b.classList.add('show');
                        b.querySelector('.badge').classList.add('show');
                    });
                    return;
                }

                const line = document.createElement('div');
                line.className = 'line';
                let html = '';
                if (beat.speaker) {
                    html += '<div class="speaker ' + beat.speaker + '">' + (beat.speaker === 'ai' ? 'AI Agent' : 'Debtor') + '</div>';
                }
                html += '<div class="words ' + beat.size + ' ' + beat.mood + '">' + beat.text + '</div>';
                line.innerHTML = html;
                container.appendChild(line);
                requestAnimationFrame(() => requestAnimationFrame(() => line.classList.add('show')));

            }, beat.delay);
            timers.push(t);
            lastBeatEnd = Math.max(lastBeatEnd, beat.delay + (beat.badge ? 3000 : 0));
        });

        // Auto-advance to next scene
        const advanceDelay = lastBeatEnd + 2500;
        const adv = setTimeout(() => {
            // Fade out
            container.style.opacity = '0';
            setTimeout(() => {
                const next = (idx + 1) % scenes.length;
                playScene(next);
            }, 600);
        }, advanceDelay);
        timers.push(adv);
    }

    // ═══════════════════════════════════════
    // KEYBOARD
    // ═══════════════════════════════════════
    document.addEventListener('keydown', e => {
        if (e.code === 'ArrowRight') playScene((currentScene + 1) % scenes.length);
        if (e.code === 'ArrowLeft') playScene((currentScene - 1 + scenes.length) % scenes.length);
        if (e.code === 'Space') { e.preventDefault(); audioBtn.click(); }
    });

    // ═══════════════════════════════════════
    // START
    // ═══════════════════════════════════════
    playScene(0);
})();
</script>
</body>
</html>
