<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentCollect — Agent IA de Recouvrement</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23433196'/%3E%3Ctext x='28' y='48' text-anchor='middle' fill='white' font-family='system-ui' font-weight='900' font-size='46' letter-spacing='-3'%3EA%3C/text%3E%3Ccircle cx='52' cy='16' r='6' fill='white' opacity='0.85'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #06080f;
  --bg-card: rgba(255,255,255,.03);
  --accent: #6366f1;
  --accent-bright: #818cf8;
  --green: #34d399;
  --text: #f0f0f8;
  --text-secondary: #a1a1b5;
  --text-muted: #5a5a72;
  --font-display: 'Plus Jakarta Sans', sans-serif;
  --font-body: 'Inter', -apple-system, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* Animated gradient background */
.bg-gradient {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,.15), transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(16,185,129,.08), transparent),
    radial-gradient(ellipse 50% 30% at 10% 60%, rgba(99,102,241,.06), transparent);
}

/* Grid overlay */
.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.015) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 20%, transparent 70%);
}

.app {
  position: relative;
  z-index: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Logo */
.logo {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 18px;
  letter-spacing: -0.3px;
  color: var(--text);
  position: fixed;
  top: 28px;
  left: 32px;
  z-index: 10;
  opacity: .7;
}
.logo .dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  margin-left: 1px;
  vertical-align: super;
  font-size: 0;
}

/* Main content */
.main {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  width: 100%;
  max-width: 480px;
  padding: 0 24px;
}

/* Orb container */
.orb-container {
  position: relative;
  width: 200px;
  height: 200px;
  margin-bottom: 32px;
  cursor: pointer;
}

/* Glow rings */
.orb-ring {
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  border: 1px solid rgba(99,102,241,.1);
  transition: all .6s;
}
.orb-ring:nth-child(2) { inset: -40px; border-color: rgba(99,102,241,.05); }
.orb-ring:nth-child(3) { inset: -60px; border-color: rgba(99,102,241,.03); }

.orb-container.active .orb-ring {
  border-color: rgba(99,102,241,.2);
  animation: ring-pulse 2s ease-in-out infinite;
}
.orb-container.active .orb-ring:nth-child(2) {
  animation-delay: .3s;
  border-color: rgba(99,102,241,.12);
}
.orb-container.active .orb-ring:nth-child(3) {
  animation-delay: .6s;
  border-color: rgba(99,102,241,.06);
}
@keyframes ring-pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: .6; }
}

/* The orb itself */
.orb {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 30%, #818cf8 0%, #6366f1 40%, #4338ca 80%, #312e81 100%);
  box-shadow:
    0 0 60px rgba(99,102,241,.3),
    0 0 120px rgba(99,102,241,.1),
    inset 0 -20px 40px rgba(0,0,0,.3),
    inset 0 20px 40px rgba(255,255,255,.05);
  transition: transform .4s cubic-bezier(.16,1,.3,1), box-shadow .4s;
}
.orb:hover {
  transform: scale(1.03);
  box-shadow:
    0 0 80px rgba(99,102,241,.4),
    0 0 160px rgba(99,102,241,.15),
    inset 0 -20px 40px rgba(0,0,0,.3),
    inset 0 20px 40px rgba(255,255,255,.05);
}
.orb-container.active .orb {
  animation: orb-breathe 3s ease-in-out infinite;
  box-shadow:
    0 0 100px rgba(99,102,241,.5),
    0 0 200px rgba(99,102,241,.2),
    inset 0 -20px 40px rgba(0,0,0,.3),
    inset 0 20px 40px rgba(255,255,255,.05);
}
@keyframes orb-breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* Orb inner shine */
.orb::after {
  content: '';
  position: absolute;
  top: 15%;
  left: 20%;
  width: 35%;
  height: 25%;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,255,255,.2), transparent);
  filter: blur(8px);
}

/* Icon in orb */
.orb-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 2;
  transition: opacity .3s;
}
.orb-icon svg {
  width: 48px;
  height: 48px;
  fill: white;
  opacity: .85;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.3));
}

/* Audio visualizer bars (shown during call) */
.visualizer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  gap: 4px;
  align-items: center;
  opacity: 0;
  transition: opacity .4s;
  pointer-events: none;
}
.orb-container.active .visualizer {
  opacity: 1;
}
.orb-container.active .orb-icon {
  opacity: 0;
}
.viz-bar {
  width: 4px;
  height: 20px;
  background: rgba(255,255,255,.8);
  border-radius: 2px;
  animation: viz-idle 1.5s ease-in-out infinite;
}
.viz-bar:nth-child(1) { animation-delay: 0s; }
.viz-bar:nth-child(2) { animation-delay: .15s; }
.viz-bar:nth-child(3) { animation-delay: .3s; }
.viz-bar:nth-child(4) { animation-delay: .45s; }
.viz-bar:nth-child(5) { animation-delay: .6s; }
.viz-bar:nth-child(6) { animation-delay: .75s; }
.viz-bar:nth-child(7) { animation-delay: .9s; }

@keyframes viz-idle {
  0%, 100% { height: 12px; opacity: .4; }
  50% { height: 36px; opacity: .9; }
}
.orb-container.speaking .viz-bar {
  animation-name: viz-speak;
  animation-duration: .4s;
}
@keyframes viz-speak {
  0%, 100% { height: 10px; }
  25% { height: 50px; }
  50% { height: 30px; }
  75% { height: 45px; }
}

/* Status text */
.status-area {
  text-align: center;
  margin-bottom: 24px;
}
.status-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
}
.status-text {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 22px;
  color: var(--text);
  transition: color .3s;
}
.status-text.active { color: var(--green); }
.status-text.error { color: #f87171; }

/* Config panel */
.config-panel {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}
.config-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.cfg-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.cfg-field label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .8px;
}
.cfg-field input {
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font-body);
  outline: none;
  transition: border-color .2s, background .2s;
}
.cfg-field input:focus {
  border-color: rgba(99,102,241,.4);
  background: rgba(255,255,255,.05);
}
.cfg-field input::placeholder { color: rgba(255,255,255,.15); }

/* Transcript */
.transcript {
  width: 100%;
  background: var(--bg-card);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.04);
  border-radius: 14px;
  padding: 16px 18px;
  max-height: 180px;
  overflow-y: auto;
  font-size: 14px;
  line-height: 1.7;
  display: none;
  margin-top: 8px;
}
.transcript .t-msg { margin-bottom: 8px; }
.transcript .t-agent { color: var(--accent-bright); }
.transcript .t-user { color: var(--text-secondary); }
.transcript .t-role {
  font-weight: 700;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-right: 6px;
  opacity: .7;
}

/* End call */
.end-btn {
  display: none;
  margin-top: 16px;
  padding: 10px 32px;
  background: rgba(248,113,113,.15);
  color: #f87171;
  border: 1px solid rgba(248,113,113,.2);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font-body);
  letter-spacing: .3px;
  transition: background .2s, border-color .2s;
}
.end-btn:hover {
  background: rgba(248,113,113,.25);
  border-color: rgba(248,113,113,.4);
}

/* Click hint */
.click-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 8px;
  opacity: 0;
  animation: fade-in 1s ease 1.5s forwards;
}
@keyframes fade-in {
  to { opacity: .5; }
}

/* Timer */
.timer {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 6px;
  display: none;
  letter-spacing: 1px;
}

/* Responsive */
@media (max-height: 700px) {
  .orb-container { width: 160px; height: 160px; margin-bottom: 24px; }
  .orb-ring:nth-child(2) { inset: -30px; }
  .orb-ring:nth-child(3) { inset: -50px; }
}
  </style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="bg-grid"></div>

<div class="app">
  <div class="logo">AgentCollect<span class="dot"></span></div>

  <div class="main">
    <div class="config-panel" id="config-panel">
      <div class="cfg-field" style="grid-column: span 2">
        <label>Entreprise (creancier)</label>
        <input type="text" id="cfg-company" value="BFM Business" placeholder="Nom de l'entreprise">
      </div>
      <div class="config-row">
        <div class="cfg-field">
          <label>Montant</label>
          <input type="text" id="cfg-amount" value="12 400 euros" placeholder="2 450 euros">
        </div>
        <div class="cfg-field">
          <label>Debiteur</label>
          <input type="text" id="cfg-debtor" value="" placeholder="Prenom (optionnel)">
        </div>
      </div>
      <div class="cfg-field">
        <label>Facture</label>
        <input type="text" id="cfg-product" value="Placement publicitaire TV - campagne Q4 2024" placeholder="Description...">
      </div>
    </div>

    <div class="orb-container" id="orb-container" onclick="toggleCall()">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb"></div>
      <div class="orb-icon" id="orb-icon">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </div>
      <div class="visualizer">
        <div class="viz-bar"></div>
        <div class="viz-bar"></div>
        <div class="viz-bar"></div>
        <div class="viz-bar"></div>
        <div class="viz-bar"></div>
        <div class="viz-bar"></div>
        <div class="viz-bar"></div>
      </div>
    </div>

    <div class="status-area">
      <div class="status-label" id="status-label">Agent vocal IA</div>
      <div class="status-text" id="status-text">Cliquez pour parler</div>
      <div class="timer" id="timer">00:00</div>
    </div>

    <p class="click-hint" id="click-hint">Votre navigateur demandera l'acces au micro</p>

    <button class="end-btn" id="end-btn" onclick="endCall()">Raccrocher</button>

    <div class="transcript" id="transcript"></div>
  </div>
</div>

<script>
var retellClient = null;
var callActive = false;
var timerInterval = null;
var callSeconds = 0;

function updateTimer() {
  callSeconds++;
  var m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
  var s = String(callSeconds % 60).padStart(2, '0');
  document.getElementById('timer').textContent = m + ':' + s;
}

async function toggleCall() {
  if (callActive) return;

  var container = document.getElementById('orb-container');
  var statusLabel = document.getElementById('status-label');
  var statusText = document.getElementById('status-text');
  var transcript = document.getElementById('transcript');
  var endBtn = document.getElementById('end-btn');
  var config = document.getElementById('config-panel');
  var timer = document.getElementById('timer');
  var hint = document.getElementById('click-hint');

  statusText.className = 'status-text';
  statusText.textContent = 'Connexion...';
  statusLabel.textContent = 'Initialisation';
  container.classList.add('active');
  config.style.display = 'none';
  hint.style.display = 'none';

  var company = document.getElementById('cfg-company').value || 'BFM Business';
  var amount = document.getElementById('cfg-amount').value || '12 400 euros';
  var debtor = document.getElementById('cfg-debtor').value || '';
  var product = document.getElementById('cfg-product').value || 'Placement publicitaire TV';

  try {
    var response = await fetch('https://backend.widr.app/api/v1/demo/web-call', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        company_name: company,
        product: product,
        amount: amount,
        debtor_name: debtor,
        language: 'fr'
      })
    });

    if (!response.ok) throw new Error('API ' + response.status);
    var result = await response.json();
    if (!result.success || !result.access_token) throw new Error(result.message || 'Pas de token');

    var module = await import('https://cdn.jsdelivr.net/npm/retell-client-js-sdk@2.0.7/+esm');
    var RetellWebClient = module.RetellWebClient;
    retellClient = new RetellWebClient();

    retellClient.on('call_started', function() {
      callActive = true;
      statusLabel.textContent = 'Appel en cours';
      statusText.className = 'status-text active';
      statusText.textContent = 'Parlez maintenant';
      endBtn.style.display = 'inline-block';
      transcript.style.display = 'block';
      transcript.innerHTML = '';
      timer.style.display = 'block';
      callSeconds = 0;
      timerInterval = setInterval(updateTimer, 1000);
    });

    retellClient.on('call_ended', function() {
      resetUI('Appel termine');
    });

    retellClient.on('agent_start_talking', function() {
      container.classList.add('speaking');
      statusText.textContent = 'Camille parle...';
    });

    retellClient.on('agent_stop_talking', function() {
      container.classList.remove('speaking');
      statusText.textContent = 'A vous';
    });

    retellClient.on('update', function(update) {
      if (update && update.transcript) {
        renderTranscript(update.transcript);
      }
    });

    retellClient.on('error', function(err) {
      console.error('RetellAI error:', err);
      resetUI('Erreur de connexion');
    });

    await retellClient.startCall({ accessToken: result.access_token });

  } catch (err) {
    console.error('Call error:', err);
    statusText.className = 'status-text error';
    statusText.textContent = err.message;
    statusLabel.textContent = 'Erreur';
    container.classList.remove('active');
    config.style.display = 'flex';
    hint.style.display = '';
    setTimeout(function() {
      statusText.className = 'status-text';
      statusText.textContent = 'Cliquez pour parler';
      statusLabel.textContent = 'Agent vocal IA';
    }, 4000);
  }
}

function endCall() {
  if (retellClient) {
    try { retellClient.stopCall(); } catch(e) {}
  }
  resetUI('Appel termine');
}

function resetUI(msg) {
  callActive = false;
  retellClient = null;
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

  var container = document.getElementById('orb-container');
  var statusLabel = document.getElementById('status-label');
  var statusText = document.getElementById('status-text');
  var endBtn = document.getElementById('end-btn');
  var config = document.getElementById('config-panel');
  var timer = document.getElementById('timer');
  var hint = document.getElementById('click-hint');

  container.classList.remove('active', 'speaking');
  endBtn.style.display = 'none';
  timer.style.display = 'none';
  statusLabel.textContent = 'Termine';
  statusText.className = 'status-text';
  statusText.textContent = msg || 'Appel termine';

  setTimeout(function() {
    config.style.display = 'flex';
    hint.style.display = '';
    statusLabel.textContent = 'Agent vocal IA';
    statusText.textContent = 'Cliquez pour parler';
  }, 3000);
}

function renderTranscript(messages) {
  var box = document.getElementById('transcript');
  var html = '';
  for (var i = 0; i < messages.length; i++) {
    var m = messages[i];
    if (!(m.content || '').trim()) continue;
    var isAgent = m.role === 'agent';
    var cls = isAgent ? 't-agent' : 't-user';
    var label = isAgent ? 'Camille' : 'Vous';
    html += '<div class="t-msg ' + cls + '"><span class="t-role">' + label + '</span>' + m.content + '</div>';
  }
  box.innerHTML = html;
  box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
